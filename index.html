<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Reacture Portfolio</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0D1117;
            color: #f0f6fc;
            min-height: 100vh;
        }

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0D1117;
            gap: 16px;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash-title {
            font-family: monospace;
            font-size: 22px;
            color: #67e8f9;
            letter-spacing: 0.08em;
        }

        #splash-sub {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(103, 232, 249, 0.2);
            border-top-color: #67e8f9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #root {
            min-height: 100vh;
        }

        #error-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #0D1117;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            padding: 32px;
            text-align: center;
            z-index: 99999;
        }

        #error-overlay.visible {
            display: flex;
        }

        #error-title {
            font-family: monospace;
            font-size: 18px;
            color: #f85149;
        }

        #error-message {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
            max-width: 480px;
            white-space: pre-wrap;
            word-break: break-word;
            background: #161b22;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: left;
        }
    </style>
</head>

<body>

    <div id="splash">
        <div class="spinner"></div>
        <div id="splash-title">Reacture</div>
        <div id="splash-sub">Loading your portfolio...</div>
    </div>

    <div id="error-overlay">
        <div id="error-title">⚠️ Runtime Error</div>
        <pre id="error-message"></pre>
    </div>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

function useTheme() {

}

  })
};

// 🔄 EVOLVED: Projects uses styled filter buttons + card grid
function Projects({ isDark }) {
  const [filter, setFilter] = React.useState("All");

  const projects = [
    { id: 1, name: "Portfolio Website", type: "React" },

            style={{
              padding: "20px",
              borderRadius: "18px",
              background: isDark ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)",
              border: "1px solid rgba(255,255,255,0.05)",
              transition: "0.25s"
            }}
          >
            <h3 style={{ marginBottom: "8px" }}>{project.name}</h3>
            <p style={{ opacity: 0.7 }}>{project.type} Project</p>
          </div>
        ))}
      </div>
    </section>
  );
}

}

    <script>
        (function () {
            function hideSplash() {
                var root = document.getElementById('root');
                var splash = document.getElementById('splash');
                if (root && root.children.length > 0) {
                    splash.classList.add('hidden');
                    setTimeout(function () { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 500);
                } else {
                    setTimeout(hideSplash, 100);
                }
            }

            window.addEventListener('error', function (event) {
                document.getElementById('splash').classList.add('hidden');
                var overlay = document.getElementById('error-overlay');
                overlay.classList.add('visible');
                document.getElementById('error-message').textContent =
                    (event.error && event.error.message) || String(event.message || event);
            });

            window.addEventListener('load', function () { setTimeout(hideSplash, 300); });
        })();
    </script>
